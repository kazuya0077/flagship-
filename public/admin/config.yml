# ================================================================
# FLAGSHIP — CMS 設定ファイル (Sveltia CMS / Decap CMS 共通)
# 管理者UI: https://flagship-2i0.pages.dev/admin/
# ================================================================

backend:
  name: github
  repo: kazuya0077/flagship-
  branch: main
  # GitHub OAuth App の Client ID
  app_id: Ov23lifndhwwlj9TQ9X9
  # OAuth認証を処理するCloudflare Worker
  base_url: https://flagship-cms-auth.kd-jj-0131.workers.dev
  auth_endpoint: /auth

# メディア（画像）のアップロード先
media_folder: "public/images/blog"
public_folder: "/images/blog"

# 日本語UI
locale: ja

# ================================================================
# コレクション定義
# ================================================================
collections:

  # ── ブログ記事 ───────────────────────────────────────────────
  - name: "blog"
    label: "📝 ブログ記事"
    label_singular: "記事"
    folder: "src/content/blog"
    create: true
    slug: "{{slug}}"
    preview_path: "/blog/{{slug}}"
    sortable_fields: ["pubDate", "title", "category"]
    view_filters:
      - label: "下書き"
        field: draft
        pattern: true
    fields:

      - label: "タイトル"
        name: "title"
        widget: "string"
        hint: "記事のタイトル"

      - label: "概要（SEO説明文）"
        name: "description"
        widget: "text"
        hint: "検索結果・SNSシェア時に表示される説明文（100〜150文字推奨）"

      - label: "公開日"
        name: "pubDate"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY/MM/DD"
        time_format: false
        default: ""

      - label: "サムネイル画像"
        name: "heroImage"
        widget: "image"
        required: false
        hint: "記事一覧・OGPに表示（推奨: 1200×630px）"

      - label: "カテゴリ"
        name: "category"
        widget: "select"
        options:
          - { label: "📚 国試対策",    value: "国試対策" }
          - { label: "🎯 キャリア",    value: "キャリア" }
          - { label: "🤝 コミュニティ", value: "コミュニティ" }
          - { label: "🩺 PT基礎知識",  value: "PT基礎知識" }
          - { label: "📢 お知らせ",    value: "お知らせ" }
        default: "お知らせ"

      - label: "タグ"
        name: "tags"
        widget: "list"
        required: false
        hint: "Enterキーで追加（例: 国試、学習法、合格体験記）"

      - label: "著者名"
        name: "author"
        widget: "string"
        required: false
        default: "FLAGSHIP編集部"

      - label: "下書き保存（非公開）"
        name: "draft"
        widget: "boolean"
        default: false
        hint: "ONにすると公開されません"

      - label: "本文"
        name: "body"
        widget: "markdown"
        hint: "Markdown・リッチテキストで本文を作成できます"

  # ── ASP商品（おすすめ教材）─────────────────────────────────
  - name: "asp_products"
    label: "💰 おすすめ教材・ASP商品"
    label_singular: "商品"
    folder: "src/content/asp"
    create: true
    slug: "{{slug}}"
    fields:

      - label: "商品名"
        name: "title"
        widget: "string"

      - label: "説明文"
        name: "description"
        widget: "text"
        hint: "商品の特徴・おすすめポイント"

      - label: "価格"
        name: "price"
        widget: "string"
        required: false
        hint: "例: ¥3,960（税込）/ 無料"

      - label: "バッジラベル"
        name: "badge"
        widget: "string"
        required: false
        hint: "例: おすすめ / 定番 / 期間限定"

      - label: "商品画像"
        name: "image"
        widget: "image"
        required: false

      - label: "Amazonアフィリエイトリンク"
        name: "amazonUrl"
        widget: "string"
        required: false

      - label: "楽天アフィリエイトリンク"
        name: "rakutenUrl"
        widget: "string"
        required: false

      - label: "公式サイトリンク"
        name: "officialUrl"
        widget: "string"
        required: false

      - label: "表示順（小さい数字が先）"
        name: "order"
        widget: "number"
        default: 0

      - label: "非表示"
        name: "hidden"
        widget: "boolean"
        default: false
