name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output files ===" && ls dist/
          echo "=== Page count ===" && find dist -name "*.html" | wc -l

      - name: Extract safe commit message
        id: commit_msg
        run: |
          # Get first line only, strip non-ASCII chars that break the Cloudflare API
          MSG=$(git log -1 --format="%s" | head -1 | tr -d '\000-\037' | sed 's/[<>]//g' | cut -c1-100)
          echo "msg=$MSG" >> $GITHUB_OUTPUT

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >-
            pages deploy dist
            --project-name=pt-kokushi
            --commit-dirty=true
            --commit-hash=${{ github.sha }}
            --commit-message='${{ steps.commit_msg.outputs.msg }}'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
