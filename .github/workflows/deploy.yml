name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          echo "=== Build output files ===" && ls dist/
          echo "=== Page count ===" && find dist -name "*.html" | wc -l

      - name: Deploy to Cloudflare Pages
        run: |
          # Extract only first line of commit subject, strip angle brackets
          # (Co-Authored-By <email@> in body causes CF API error 8000111)
          SAFE_MSG=$(git log -1 --format="%s" | tr -d '<>"\\' | cut -c1-72)
          npx wrangler pages deploy dist \
            --project-name=pt-kokushi \
            --commit-dirty=true \
            --commit-hash="$GITHUB_SHA" \
            --commit-message="$SAFE_MSG"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
